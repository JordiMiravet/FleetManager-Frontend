<div 
    class="drawer__backdrop" 
    (click)="onClose()"
    [attr.aria-hidden]="true"
></div>

<aside 
    class="drawer" 
    role="dialog" 
    [attr.aria-label]="drawerMsg.aria.drawer"
>

    <div class="drawer__header">
        <span class="drawer__title">{{ drawerMsg.title }}</span>
        <button 
            class="drawer__close"
            (click)="onClose()"
            [attr.aria-label]="drawerMsg.aria.closeButton"
        >
            <i class="pi pi-times" aria-hidden="true"></i>
        </button>
    </div>

    <div class="drawer__body">

        <section class="drawer__section">
            <button class="drawer__item" >
                <div class="drawer__item-content">
                    <i class="pi pi-user" aria-hidden="true"></i>
                    {{ drawerMsg.items.editProfile }}
                </div>

            </button>

            <button class="drawer__item">
                <div class="drawer__item-content">
                    <i class="pi pi-sliders-h" aria-hidden="true"></i>
                    {{ drawerMsg.items.settings }}
                </div>
                
            </button>

            <button class="drawer__item">
                <div class="drawer__item-content">
                    <i class="pi pi-globe" aria-hidden="true"></i>
                    {{ drawerMsg.items.language }}
                </div>
            </button>

            <button class="drawer__item">
                <div class="drawer__item-content">
                    <i class="pi pi-moon"></i>

                    <span class="drawer__label">
                        {{ drawerMsg.items.darkMode }}
                    </span>
                </div>

                <app-dark-mode-toggle
                ></app-dark-mode-toggle>
            </button>

        </section>
        
        <section class="drawer__section">
            <div class="drawer__divider"></div>
            <button 
                class="drawer__item drawer__item--danger"
                (click)="onLogout()"
            >
                {{ drawerMsg.buttons.logout }}
                <i class="pi pi-sign-out" aria-hidden="true"></i>   
            </button>
        </section>
        
    </div>

</aside>
