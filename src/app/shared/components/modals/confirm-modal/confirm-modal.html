<dialog
    class="modal__backdrop"
    (click)="onCancel()"
    (keydown.escape)="onCancel()"
    aria-modal="true"
    aria-labelledby="confirm-modal__modal-title"
    aria-describedby="confirm-modal__modal-message"
>
    <form 
        class="modal__form" 
        method="dialog" 
        (click)="$event.stopPropagation()"
    >

        <h2 class="modal__title" id="confirm-modal__modal-title">
            {{ title() }}
        </h2>

        <p class="modal__message" id="confirm-modal__modal-message">
            {{ message() }}
        </p>

        <div class="modal__actions">
            <button
                type="submit"
                class="modal__button modal__button--confirm"
                aria-label="Confirm action"
                (click)="onConfirm()"
            >
                Confirm
            </button>

            <button
                type="button"
                class="modal__button modal__button--cancel"
                (click)="onCancel()"
                aria-label="Cancel action"
            >
                Cancel
            </button>
        </div>

    </form>
</dialog>
