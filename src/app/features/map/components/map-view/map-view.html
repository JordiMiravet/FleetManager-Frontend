<section class="map-view">

    <app-vehicle-selector
        [vehicles]="vehicles()"
        (vehicleSelected)="showVehicle($event)"
        class="map-view__selector"
    />

    <div 
        id="map" 
        class="map-view__map" 
        role="region"
        [attr.aria-label]="messages.mapView.ariaLabel"
        aria-describedby="map-description"
    ></div>
    <p id="map-description" class="sr-only">
        {{ messages.mapView.ariaDescribedby }}
    </p>

    @if(selectedVehicle()){
        <app-details-panel
            (click)="onUserLocationClick()"
            [vehicle]="selectedVehicle()"
            class="map-view__button--location"
        />
    }

</section>

@if(showConfirmModal()){
    <app-confirm-modal
        [title]="messages.confirmModal.title"
        [message]="messages.confirmModal.message"
        (confirm)="onConfirmLocationChange()"
        (cancel)="onCancelLocationChange()"
    />
}
