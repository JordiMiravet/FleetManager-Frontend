<section class="map-view">

    <app-vehicle-selector
        class="map-view__vehicle-selector"
        [vehicles]="vehicles()"
        (vehicleSelected)="showVehicle($event)"
    />

    <section 
        id="map" 
        class="map-view__map" 
        [attr.aria-label]="mapViewMsg.aria.mapRegion"
        aria-describedby="map-description"
    ></section>
    <p 
        class="sr-only"
        id="map-view__description"
    >
        {{ mapViewMsg.aria.mapDescription }}
    </p>

    @if(selectedVehicle()){
        <app-details-panel
            class="map-view__details-panel"
            (click)="onUserLocationClick()"
            [vehicle]="selectedVehicle()"
        />
    }

</section>

@if(showConfirmModal()){
    <app-confirm-modal
        class="confirm-modal"
        [title]="mapViewMsg.confirmModal.title"
        [message]="mapViewMsg.confirmModal.message"
        (confirm)="onConfirmLocationChange()"
        (cancel)="onCancelLocationChange()"
    />
}
