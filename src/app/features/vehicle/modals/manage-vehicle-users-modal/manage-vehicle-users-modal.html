<div 
    class="modal-overlay" 
    (click)="onCancel()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="addUserTitle"
>
    <div class="modal" (click)="$event.stopPropagation()">
        <h2 id="addUserTitle" class="modal__title">
            Add User to Vehicle
            <i class="pi pi-user" aria-hidden="true"></i>
        </h2>
        
        <div class="modal__content">
            <label for="userEmail" class="modal__label">User Email *</label>
            <input 
                id="userEmail"
                type="email" 
                [(ngModel)]="email"
                name="'email"
                placeholder="user@example.com"
                class="modal__input"
                [class.modal__input--error]="error()"
                [disabled]="loading()"
                (keydown.enter)="onSubmit()"
                aria-describedby="emailError"
            />
            
            @if (error()) {
                <p id="emailError" class="modal__error" role="alert">
                    <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
                    {{ error() }}
                </p>
            }
        </div>
        
        <div class="modal__actions">
            <button 
                class="modal__button modal__button--submit"
                (click)="onSubmit()"
                [disabled]="loading()"
            >
                @if (loading()) {
                    <i class="pi pi-spin pi-spinner" aria-hidden="true"></i>
                    Adding...
                } @else {
                    <i class="pi pi-check" aria-hidden="true"></i>
                    Add User
                }
            </button>
            <button 
                class="modal__button modal__button--cancel"
                (click)="onCancel()"
                [disabled]="loading()"
            >
                Cancel
            </button>
        </div>
    </div>
</div>
