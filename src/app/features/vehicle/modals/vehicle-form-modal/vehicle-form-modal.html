<dialog 
    class="modal" 
    role="dialog"
    aria-modal="true" 
    aria-labelledby="modal-title"
    (click)="onCancel()"
>
    <form 
        [formGroup]="form" 
        (keydown.enter)="$event.preventDefault(); onSubmit()" 
        class="modal__form"
        (click)="$event.stopPropagation()"
    >
        
        <fieldset class="modal__fieldset">
                
            <legend id="modal-title" class="modal__legend">
                <i class="pi pi-car" aria-hidden="true"></i>
                {{ mode() === 'create' ? formMsg.title.create : formMsg.title.edit }}
            </legend>

            <div class="modal__form-section">
                <label for="createVehicleName" class="modal__label">{{ formMsg.fields.name.label }}</label>
                <input 
                    type="text" 
                    id="createVehicleName" 
                    formControlName="name" 
                    class="modal__input" 
                    [placeholder]="formMsg.fields.name.placeholder"
                    [ngClass]="{'modal__input--error': form.controls['name'].invalid && form.controls['name'].touched}"
                    [attr.aria-invalid]="form.controls['name'].invalid && form.controls['name'].touched"
                    [attr.aria-label]="ariaMsg.nameInput"
                    aria-describedby="createVehicleName-error"
                />
                
                <p 
                    id="createVehicleName-error" 
                    class="modal__error-text" 
                    role="alert"
                    [hidden]="form.controls['name'].valid || !form.controls['name'].touched"
                >
                    <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
                    {{ getFieldError('name') }}
                </p>
            </div>

            <div class="modal__form-section">
                <label for="createVehicleModel" class="modal__label">{{ formMsg.fields.model.label }}</label>
                <input 
                    type="text" 
                    id="createVehicleModel" 
                    formControlName="model" 
                    class="modal__input"
                    [placeholder]="formMsg.fields.model.placeholder"
                    [ngClass]="{'modal__input--error': form.controls['model'].invalid && form.controls['model'].touched}"
                    [attr.aria-invalid]="form.controls['model'].invalid && form.controls['model'].touched"
                    [attr.aria-label]="ariaMsg.modelInput"
                    aria-describedby="createVehicleModel-error"
                />
                
                <p 
                    id="createVehicleModel-error" 
                    class="modal__error-text" 
                    role="alert"
                    [hidden]="form.controls['model'].valid || !form.controls['model'].touched"
                >
                    <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
                    {{ getFieldError('model') }}
                </p>
            </div>

            <div class="modal__form-section">
                <label for="createVehiclePlate" class="modal__label">{{ formMsg.fields.plate.label }}</label>
                <input 
                    type="text" 
                    id="createVehiclePlate" 
                    formControlName="plate" 
                    class="modal__input" 
                    [placeholder]="formMsg.fields.plate.placeholder"
                    [ngClass]="{'modal__input--error': form.controls['plate'].invalid && form.controls['plate'].touched}"
                    [attr.aria-invalid]="form.controls['plate'].invalid && form.controls['plate'].touched"
                    [attr.aria-label]="ariaMsg.plateInput"
                    aria-describedby="createVehiclePlate-error"
                />
                
                <p 
                    id="createVehiclePlate-error" 
                    class="modal__error-text" 
                    role="alert"
                    [hidden]="form.controls['plate'].valid || !form.controls['plate'].touched"
                >
                    <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
                    {{ getFieldError('plate') }}
                </p>
            </div>

        </fieldset>

        <div class="modal__actions">
            <button 
                type="button" 
                class="modal__button modal__button--save" 
                (click)="onSubmit()"
                [attr.aria-label]="mode() === 'create' ? ariaMsg.createButton : ariaMsg.updateButton"
            >
                <i class="pi pi-save" aria-hidden="true"></i>
                {{ mode() === 'create' ? formMsg.buttons.create : formMsg.buttons.update }}
            </button>
            
            <button 
                type="button" 
                class="modal__button modal__button--cancel" 
                (click)="onCancel()"
                [attr.aria-label]="ariaMsg.cancelButton"
            >
                {{ formMsg.buttons.cancel }}
            </button>
        </div>

        <p class="modal__note">
            <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
            {{ formMsg.note }}
        </p>
    </form>

</dialog>
