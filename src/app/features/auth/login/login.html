<form [formGroup]="formLogin" (ngSubmit)="onSubmit()" class="form">
  
  <fieldset class="form__fieldset">
    <legend class="form__legend">
      {{ authMessages.authType.login }}
      <i class="fa-solid fa-address-card" aria-hidden="true"></i>
    </legend>
    
    <div class="form__group">
      <label for="emailRegister">{{ authMessages.fieldLabels.email }}</label>
      <input 
        type="email" 
        id="emailRegister" 
        formControlName="email" 
        placeholder="Enter your email"
        autocomplete="email"
        required
        [attr.aria-invalid]="formLogin.controls['email'].invalid && formLogin.controls['email'].touched ? 'true' : 'false'"
        [attr.aria-describedby]="formLogin.controls['email'].invalid && formLogin.controls['email'].touched ? 'login-email-error' : null"
      />
      <h4 
        id="login-email-error"
        class="form__error-text"
        role="alert" 
        [hidden]="formLogin.controls['email'].valid || !formLogin.controls['email'].touched"
      >
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i> 
        {{ authMessages.errorMessages.invalidEmail }}
      </h4>
    </div>

    <div class="form__group">
      <label for="passwordRegister">{{ authMessages.fieldLabels.password }}</label>
      <input 
        type="password" 
        id="passwordRegister" 
        formControlName="password" 
        placeholder="Enter your password"
        autocomplete="current-password"
        required
        [attr.aria-invalid]="formLogin.controls['password'].invalid && formLogin.controls['password'].touched ? 'true' : 'false'"
        [attr.aria-describedby]="formLogin.controls['password'].invalid && formLogin.controls['password'].touched ? 'login-password-error' : null"
      />
      <h4 
        id="login-password-error"
        class="form__error-text"
        role="alert" 
        [hidden]="formLogin.controls['password'].valid || !formLogin.controls['password'].touched"
      >
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i> 
        {{ authMessages.errorMessages.invalidPassword }}
      </h4>
    </div>

    <button 
      type="submit" 
      class="btn__auth" 
      aria-label="Login with email and password"
    >
      {{ authMessages.authType.login }}
    </button>
    
    @if(errorSubmit){ 
      <h4 class="form__error-submit" role="alert">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        {{ errorSubmit }}
      </h4>
    }
  </fieldset>
  
  <p class="form__note">{{ authMessages.note }}</p>
</form>
