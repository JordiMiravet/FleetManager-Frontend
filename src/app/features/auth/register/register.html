<form [formGroup]="formReg" (ngSubmit)="onSubmit()" class="form">
  <fieldset class="form__fieldset">
    <legend class="form__legend">
      {{ authMessage.authType.register }}
      <i class="fa-regular fa-address-card" aria-hidden="true"></i>
    </legend>
    
    <div class="form__group">
      <label for="emailRegister">{{ authMessage.fieldLabels.email }}</label>
      <input 
        type="email" 
        id="emailRegister" 
        formControlName="email" 
        placeholder="Enter your email"
        autocomplete="email"
        required
        [attr.aria-invalid]="formReg.controls['email'].invalid && formReg.controls['email'].touched ? 'true' : 'false'"
        [attr.aria-describedby]="formReg.controls['email'].invalid && formReg.controls['email'].touched ? 'register-email-error' : null"
      />
      <h4 
        id="register-email-error"
        class="form__error-text"
        role="alert"
        [hidden]="formReg.controls['email'].valid || !formReg.controls['email'].touched"
      >
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        {{ authMessage.errorMessages.invalidEmail }}
      </h4>
    </div>

    <div class="form__group">
      <label for="passwordRegister">{{ authMessage.fieldLabels.password }}</label>
      <input 
        type="password" 
        id="passwordRegister" 
        formControlName="password" 
        placeholder="Enter your password"
        autocomplete="new-password"
        required
        [attr.aria-invalid]="formReg.controls['password'].invalid && formReg.controls['password'].touched ? 'true' : 'false'"
        [attr.aria-describedby]="formReg.controls['password'].invalid && formReg.controls['password'].touched ? 'register-password-error' : null"
      />
      <h4 
        id="register-password-error"
        class="form__error-text" 
        role="alert"
        [hidden]="formReg.controls['password'].valid || !formReg.controls['password'].touched"
      >
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        {{ authMessage.errorMessages.invalidPassword }}
      </h4>
    </div>

    <button type="submit" class="btn__auth">{{ authMessage.authType.register }}</button>

    @if(errorSubmit){ 
      <h4 class="form__error-submit" role="alert">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        {{ errorSubmit }}
      </h4>
    }

  </fieldset>

  <p class="form__note">{{ authMessage.note }}</p>
</form>
