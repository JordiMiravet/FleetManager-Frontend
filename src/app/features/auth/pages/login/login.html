<div class="auth">
  <form [formGroup]="formLogin" (ngSubmit)="onSubmit()" class="form">

    <fieldset class="form__fieldset">
      <legend class="form__legend">
        {{ formMsg.title.login }}
        <i class="fa-solid fa-address-card" aria-hidden="true"></i>
      </legend>

      <div class="form__group">
        <label for="emailLogin" class="form__label">{{ formMsg.fields.email.label }}</label>
        <input
          type="email"
          id="emailLogin"
          class="form__input"
          formControlName="email"
          [placeholder]="formMsg.fields.email.placeholder"
          autocomplete="email"
          required
          [attr.aria-invalid]="formControls.email.invalid && formControls.email.touched ? 'true' : 'false'"
          [attr.aria-describedby]="formControls.email.invalid && formControls.email.touched ? 'login-email-error' : null"
        />
        <p
          id="login-email-error"
          class="form__error--field"
          role="alert"
          [hidden]="formControls.email.valid || !formControls.email.touched"
          [attr.aria-hidden]="formControls.email.valid || !formControls.email.touched ? 'true' : 'false'"
        >
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          {{ formMsg.errors.invalidEmail }}
        </p>
      </div>

      <div class="form__group">
        <label for="passwordLogin" class="form__label">{{ formMsg.fields.password.label }}</label>
        <input
          type="password"
          id="passwordLogin"
          class="form__input"
          formControlName="password"
          [placeholder]="formMsg.fields.password.placeholder"
          autocomplete="current-password"
          required
          [attr.aria-invalid]="formControls.password.invalid && formControls.password.touched ? 'true' : 'false'"
          [attr.aria-describedby]="formControls.password.invalid && formControls.password.touched ? 'login-password-error' : null"
        />
        <p
          id="login-password-error"
          class="form__error--field"
          role="alert"
          [hidden]="formControls.password.valid || !formControls.password.touched"
          [attr.aria-hidden]="formControls.password.valid || !formControls.password.touched ? 'true' : 'false'"
        >
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          {{ formMsg.errors.invalidPassword(passwordMinLength) }}
        </p>
      </div>

      <button
        type="submit"
        class="form__submit"
        [aria-label]="formMsg.aria.buttons.login"
      >
        {{ formMsg.buttons.login }}
      </button>

      @if(errorSubmit){ 
        <p class="form__error--submit" role="alert">
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          {{ errorSubmit }}
        </p>
      }
    
    </fieldset>

  </form>

  <p class="auth__nav">
    {{ formMsg.switch.toRegister.prompt }}
    <a 
      class="auth__link"
      routerLink="/register"
      [attr.aria-label]="formMsg.aria.switch.toRegister"
    >
      {{ formMsg.switch.toRegister.action }}
    </a>
  </p>

  <p class="auth__note">
    {{ formMsg.note }}
  </p>

</div>
