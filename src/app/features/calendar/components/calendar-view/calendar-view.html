<section class="calendar__actions" [aria-label]="ariaMsg.actions">
    <app-create-button
        (click)="handleCreateEvent()"
        [createText]="calendarMsg.actions.createEvent"
    ></app-create-button>

    <app-vehicle-selector
        [vehicles]="vehicleService.vehicles()"
        (vehicleSelected)="handleVehicleSelected($event)"
    ></app-vehicle-selector>
</section>

<section class="calendar__container" [aria-label]="calendarMsg.aria.calendar">
    <full-calendar
        #calendar
        [options]="calendarOptions"
        [aria-label]="calendarMsg.aria.calendar"
    ></full-calendar>
</section>

@if (activeModal() === CalendarModalState.DayEvents) {
    <app-day-events-modal
        [events]="selectedDayEvents()"
        [date]="selectedDate()"
        (createEvent)="handleCreateEventFromDay()"
        (editEvent)="handleEditEvent($event)"
        (deleteEvent)="handleDeleteEvent($event)"
        (closeModal)="activeModal.set(CalendarModalState.Closed)"
    ></app-day-events-modal>
}

@if (activeModal() === CalendarModalState.EventForm) {
    <app-event-form-modal
        [preselectedDate]="selectedDate()"
        [mode]="formMode()"
        [event]="selectedEvent()"
        (close)="activeModal.set(CalendarModalState.Closed)"
    ></app-event-form-modal>
}

@if (activeModal() === CalendarModalState.Confirm) {
    <app-confirm-modal
        [title]="confirmMsg.deleteEvent.title"
        [message]="confirmMsg.deleteEvent.message"
        (confirm)="confirmDeleteEvent()"
        (cancel)="cancelDeleteEvent()"
    ></app-confirm-modal>
}
